<style>
  :root{
    --ink:#1c1712;
    --ink-soft:#2a2118;
    --paper:#f3ead8;
    --paper-dark:#e6d9b8;
    --paper-line: rgba(28,23,18,0.08);
    --brass:#a8823c;
    --brass-light:#c9a15c;
    --brass-dark:#7a5e28;
    --red:#a13a2c;
    --red-dark:#7d2a20;
    --red-bg:#f6e1dc;
    --green:#4c7a45;
    --green-dark:#375a32;
    --green-bg:#e3ecdd;
    --text:#2a2118;
    --text-soft:#6b5f4f;
    --shadow: 0 2px 6px rgba(28,23,18,0.18);
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background: linear-gradient(180deg, var(--ink) 0%, var(--ink) 210px, var(--paper) 210px, var(--paper) 100%);
    font-family:'Assistant', sans-serif;
    color:var(--text);
    min-height:100vh;
    padding-bottom:60px;
  }

  /* LOGIN SCREEN */
  .login-screen{
    position:fixed;
    inset:0;
    background: linear-gradient(135deg, var(--ink) 0%, var(--ink-soft) 100%);
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    padding:20px;
    z-index:100;
  }
  .login-screen.hidden{display:none;}
  .login-box{
    background:var(--paper);
    border:3px solid var(--brass);
    border-radius:12px;
    padding:40px 30px;
    max-width:360px;
    width:100%;
    box-shadow: 0 10px 40px rgba(0,0,0,0.3);
  }
  .login-box h1{
    font-family:'Frank Ruhl Libre', serif;
    font-size:2rem;
    margin:0 0 10px;
    color:var(--ink);
    text-align:center;
  }
  .login-box .tagline{
    text-align:center;
    color:var(--text-soft);
    margin-bottom:30px;
    font-size:0.9rem;
  }
  .login-form label{
    display:block;
    font-weight:700;
    margin:16px 0 6px;
    font-size:0.9rem;
  }
  .login-form input{
    width:100%;
    padding:11px 13px;
    border:1px solid var(--paper-dark);
    border-radius:6px;
    font-family:'Assistant', sans-serif;
    font-size:1rem;
    margin-bottom:6px;
  }
  .login-form input:focus{
    outline:none;
    border-color:var(--brass);
    box-shadow: 0 0 0 3px rgba(168,130,60,0.1);
  }
  .login-btn-row{
    display:flex;
    gap:10px;
    margin-top:24px;
  }
  .login-btn-row button{
    flex:1;
    padding:12px;
    font-weight:700;
    border:none;
    border-radius:6px;
    font-family:'Assistant', sans-serif;
    cursor:pointer;
    font-size:0.95rem;
  }
  #loginBtn{
    background:var(--brass);
    color:var(--ink);
  }
  #loginBtn:hover{background:var(--brass-light);}
  #signupBtn{
    background:transparent;
    border:2px solid var(--brass);
    color:var(--brass-dark);
  }
  #signupBtn:hover{background:rgba(168,130,60,0.1);}
  .login-error{
    color:var(--red);
    font-size:0.85rem;
    margin-top:12px;
    padding:10px;
    background:var(--red-bg);
    border-radius:4px;
    display:none;
  }
  .login-error.show{display:block;}
  .login-mode-toggle{
    text-align:center;
    margin-top:16px;
    font-size:0.85rem;
    color:var(--text-soft);
  }
  .login-mode-toggle button{
    background:none;
    border:none;
    color:var(--brass-dark);
    font-weight:700;
    cursor:pointer;
    text-decoration:underline;
  }
  .sync-indicator{
    position:fixed;
    bottom:20px;
    right:20px;
    background:var(--green);
    color:#fff;
    padding:10px 16px;
    border-radius:20px;
    font-size:0.8rem;
    font-weight:700;
    z-index:99;
    opacity:0;
    transition:opacity 0.3s;
  }
  .sync-indicator.show{opacity:1;}
  .sync-indicator.syncing{background:var(--brass);}
  .sync-indicator.error{background:var(--red);}

  /* DASHBOARD */
  .dashboard{display:none;}
  .dashboard.active{display:block;}
  
  .masthead{
    max-width:1100px;
    margin:0 auto;
    padding:22px 24px 18px;
    color:var(--paper);
  }
  .masthead-top{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:16px;
    flex-wrap:wrap;
  }
  .logo-plate{
    display:inline-block;
    background:var(--paper);
    padding:10px 20px;
    border-radius:6px;
    box-shadow:var(--shadow);
  }
  .logo-img{
    display:block;
    height:56px;
    width:auto;
  }
  .sub{
    font-family:'Frank Ruhl Libre', serif;
    font-size:1rem;
    color:var(--brass-light);
    margin-top:2px;
    font-weight:500;
  }
  .rule-line{
    height:3px;
    background: repeating-linear-gradient(90deg, var(--brass) 0 14px, transparent 14px 18px);
    margin:14px 0 10px;
    opacity:0.85;
  }
  .week-bar{
    display:flex;
    align-items:center;
    gap:10px;
    flex-wrap:wrap;
    font-size:0.92rem;
  }
  .week-bar label{color:var(--paper-dark); font-weight:600;}
  .btn{
    border:1px solid var(--brass-dark);
    background:var(--brass);
    color:var(--ink);
    padding:7px 14px;
    border-radius:3px;
    font-family:'Assistant',sans-serif;
    font-weight:700;
    font-size:0.88rem;
    cursor:pointer;
    transition:background .15s, transform .1s;
  }
  .btn:hover{background:var(--brass-light);}
  .btn:active{transform:scale(0.97);}
  .btn.ghost{
    background:transparent;
    color:var(--paper);
    border:1px solid var(--brass);
  }
  .btn.ghost:hover{background:rgba(201,161,92,0.15);}
  .btn.danger{background:var(--red); color:var(--paper); border-color:var(--red-dark);}
  .btn.danger:hover{background:var(--red-dark);}
  .btn.small{padding:4px 10px; font-size:0.78rem;}

  .container{max-width:1100px; margin:0 auto; padding:0 24px;}

  .tabs{
    display:flex;
    gap:8px;
    margin:22px 0 6px;
    flex-wrap:wrap;
  }
  .tab-main{
    flex:1 1 140px;
    text-align:center;
    padding:14px 10px;
    background:var(--paper-dark);
    border:2px solid transparent;
    border-radius:6px 6px 0 0;
    font-family:'Frank Ruhl Libre', serif;
    font-weight:700;
    font-size:1.15rem;
    cursor:pointer;
    color:var(--text-soft);
    transition:all .15s;
  }
  .tab-main.active{
    background:var(--paper);
    border-color:var(--brass);
    border-bottom-color:var(--paper);
    color:var(--ink);
    box-shadow: 0 -2px 0 var(--brass) inset;
  }
  .tab-main .letter{
    display:inline-block;
    background:var(--brass);
    color:var(--ink);
    width:26px; height:26px; line-height:26px;
    border-radius:50%;
    font-size:0.9rem;
    margin-left:8px;
  }
  .tab-main.active .letter{background:var(--red);}

  .util-tabs{display:flex; gap:8px; margin-bottom:14px; flex-wrap:wrap;}
  .util-tab{
    padding:6px 14px;
    border:1px solid var(--brass-dark);
    border-radius:16px;
    background:transparent;
    color:var(--brass-dark);
    font-weight:700;
    font-size:0.82rem;
    cursor:pointer;
  }
  .util-tab.active{background:var(--brass-dark); color:var(--paper);}

  .board{
    background:var(--paper);
    border:2px solid var(--paper-dark);
    border-radius:0 6px 6px 6px;
    padding:22px 18px;
    background-image:
      linear-gradient(var(--paper-line) 1px, transparent 1px),
      linear-gradient(90deg, var(--paper-line) 1px, transparent 1px);
    background-size:24px 24px;
  }
  
  .section-caption{
    font-family:'Frank Ruhl Libre', serif;
    font-size:0.95rem;
    color:var(--text-soft);
    margin:0 0 16px;
    padding-bottom:8px;
    border-bottom:1px dashed var(--brass);
  }
  .week-link{
    color:var(--brass-dark);
    font-weight:800;
    cursor:pointer;
    border-bottom:1px dashed var(--brass-dark);
  }
  .week-link:hover{color:var(--red);}

  .subheading-row{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:10px;
    margin:18px 0 10px;
    padding-top:12px;
    border-top:1px dashed var(--brass);
    flex-wrap:wrap;
  }
  .subheading{
    font-family:'Frank Ruhl Libre', serif;
    font-size:0.88rem;
    color:var(--text-soft);
  }

  .pages-row{
    display:flex;
    gap:10px;
    flex-wrap:wrap;
    justify-content:flex-start;
  }
  .page-card{
    width:96px;
    background:#fffdf8;
    border:1px solid var(--paper-dark);
    border-radius:5px;
    box-shadow:var(--shadow);
    overflow:hidden;
    position:relative;
  }
  .page-card::before{
    content:"";
    position:absolute;
    top:6px; right:6px;
    width:8px; height:8px;
    border-radius:50%;
    background:var(--brass);
    box-shadow: inset 0 0 0 1px var(--brass-dark);
  }
  .page-card.special-card{
    width:118px;
  }
  .page-card.special-card::before{
    background:var(--red);
  }
  .remove-x{
    position:absolute;
    top:4px; left:4px;
    width:17px; height:17px;
    border-radius:50%;
    background:var(--red);
    color:#fff;
    font-size:11px;
    font-weight:900;
    line-height:17px;
    text-align:center;
    cursor:pointer;
    z-index:3;
  }
  .remove-x:hover{background:var(--red-dark);}
  .page-head{
    text-align:center;
    padding:8px 4px 6px;
    font-family:'Frank Ruhl Libre', serif;
    border-bottom:1px solid var(--paper-line);
  }
  .page-head .num{font-size:1.3rem; font-weight:900; color:var(--ink);}
  .page-head .num.special-label{font-size:0.92rem; font-weight:800;}
  .page-head .side{
    display:block;
    font-size:0.68rem;
    color:var(--text-soft);
    margin-top:1px;
    letter-spacing:0.5px;
  }
  .slot{
    padding:14px 8px;
    cursor:pointer;
    text-align:center;
    transition:filter .1s;
    min-height:56px;
    display:flex;
    flex-direction:column;
    justify-content:center;
  }
  .slot:hover{filter:brightness(0.96);}
  .slot .client{font-size:0.95rem; font-weight:800; margin-top:2px; word-break:break-word;}
  .slot .empty-txt{font-size:0.8rem; font-weight:600; margin-top:2px;}
  .slot.empty{background:var(--green-bg); color:var(--green-dark);}
  .slot.filled{background:var(--red-bg); color:var(--red-dark);}

  /* MODAL */
  .overlay{
    position:fixed; inset:0;
    background:rgba(20,16,12,0.55);
    display:flex; align-items:center; justify-content:center;
    z-index:50;
    padding:16px;
  }
  .overlay.hidden{display:none;}
  .modal{
    background:var(--paper);
    border:2px solid var(--brass);
    border-radius:8px;
    max-width:420px;
    width:100%;
    padding:22px;
    box-shadow:0 10px 30px rgba(0,0,0,0.35);
    max-height:88vh;
    overflow-y:auto;
  }
  .modal h3{
    font-family:'Frank Ruhl Libre', serif;
    margin:0 0 4px;
    font-size:1.25rem;
  }
  .modal .meta{color:var(--text-soft); font-size:0.85rem; margin-bottom:14px;}
  .modal label{display:block; font-weight:700; font-size:0.85rem; margin:12px 0 4px;}
  .modal input[type=text], .modal select, .modal textarea{
    width:100%;
    padding:9px 10px;
    border:1px solid var(--paper-dark);
    border-radius:4px;
    font-family:'Assistant', sans-serif;
    font-size:0.95rem;
    background:#fffdf8;
  }
  .modal textarea{resize:vertical; min-height:56px;}
  .modal-actions{display:flex; gap:8px; margin-top:18px; justify-content:flex-end;}

  .empty-state{padding:30px; text-align:center; color:var(--text-soft); font-size:0.95rem;}

  @media (max-width:640px){
    .page-card{width:30%; flex:1 1 30%;}
    .page-card.special-card{width:44%; flex:1 1 44%;}
    .masthead-top{flex-direction:column; align-items:flex-start;}
  }

  /* SYNC STATUS */
  .sync-status{
    position:fixed;
    bottom:20px;
    right:20px;
    padding:10px 16px;
    border-radius:20px;
    font-size:0.8rem;
    font-weight:700;
    z-index:99;
    background:var(--green);
    color:#fff;
    opacity:0;
    pointer-events:none;
    transition:opacity 0.3s;
  }
  .sync-status.show{opacity:1; pointer-events:auto;}
  .sync-status.syncing{background:var(--brass); animation:pulse 1s infinite;}
  .sync-status.error{background:var(--red);}

  @keyframes pulse{
    0%, 100%{opacity:1;}
    50%{opacity:0.7;}
  }

  table{width:100%; border-collapse:collapse; font-size:0.85rem; background:#fffdf8;}
  th,td{padding:8px 10px; border-bottom:1px solid var(--paper-line); text-align:right;}
  th{background:var(--paper-dark); font-family:'Frank Ruhl Libre', serif; font-weight:700;}
  tr:hover td{background:rgba(168,130,60,0.06);}
</style>
</head>
<body>

<!-- LOGIN SCREEN -->
<div id="loginScreen" class="login-screen">
  <div class="login-box">
    <h1>דער איד</h1>
    <div class="tagline">Reserved pages</div>
    <div class="login-form">
      <label>ימעיל</label>
      <input type="email" id="emailInput" placeholder="your@email.com">
      <label>פּאַסווערד</label>
      <input type="password" id="passwordInput" placeholder="••••••••">
      <div class="login-error" id="loginError"></div>
      <div class="login-btn-row">
        <button id="loginBtn" onclick="handleLogin()">אָנמעלדן</button>
        <button id="signupBtn" onclick="toggleSignup()">נייער קאונט</button>
      </div>
      <div class="login-mode-toggle">
        <span id="modeText">קיין קאונט? </span>
        <button id="toggleBtn" onclick="toggleSignup()"></button>
      </div>
    </div>
  </div>
</div>

<div id="syncStatus" class="sync-status"></div>

<script>
// ============== FIREBASE SETUP ==============
const firebaseConfig = {
  apiKey: "AIzaSyBY6nlFSHA0pIxOezanBTgDSSXcUlSqnAk",
  authDomain: "der-yid.firebaseapp.com",
  projectId: "der-yid",
  storageBucket: "der-yid.firebasestorage.app",
  messagingSenderId: "787993908932",
  appId: "1:787993908932:web:63ae96c8cc14d6b9cbdb91"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();

// ============== CONSTANTS ==============
const BASE_WEEKS = [
  'פרשת מטות מסעי — 07/11/26',
  'פרשת דברים (שבת חזון) — 07/18/26',
  'סוכות (יום טוב) — 09/25/26',
  'פסח (יום טוב) — 04/21/27'
];

const SECTIONS = [
  {key:'M', label:'מעין - מאגאזין'},
  {key:'M2', label:'מאגאזין 2'},
  {key:'A', label:'נייעס'},
  {key:'B', label:'קהילות און מוסדות'},
  {key:'B2', label:'סאטמאר'},
  {key:'D', label:'פאמיליע'}
];

const DEFAULT_PAGES = Array.from({length: 24}, (_, i) => i + 2);
const BIG_PAGES = Array.from({length: 49}, (_, i) => i + 2);
const STRIP_SIZES = [0.5,1,1.5,2,2.5,3,3.5,4,4.5,5];

// ============== STATE ==============
const state = {
  user: null,
  week: 'פרשת מטות מסעי — 07/11/26',
  activeSection: 'M',
  view: 'grid',
  pageLists: {},
  stripLists: {A:['strip-1'], B:['strip-1']},
  stripCounter: 1,
  sections: {},
  rules: [],
  auditLog: [],
  customWeeks: [],
  editingRuleId: null,
  isSignupMode: false,
  offlineQueue: []
};

// ============== LOGO ==============
const LOGO_B64 = 'iVBORw0KGgoAAAANSUhEUgAABIwAAAEfCAYAAAA2n/RTAAAAH0lEQVR42mNk+M9QDwADhgGAWjR9awAAAABJRU5ErkJggg==';

// ============== AUTH LISTENERS ==============
auth.onAuthStateChanged(user => {
  state.user = user;
  if(user) {
    document.getElementById('loginScreen').classList.add('hidden');
    document.getElementById('dashboard').classList.add('active');
    initializeAppState();
    setupRealtimeListeners();
  } else {
    document.getElementById('loginScreen').classList.remove('hidden');
    document.getElementById('dashboard').classList.remove('active');
  }
});

// ============== FUNCTIONS ==============
function isBigWeek(weekStr){
  const w = String(weekStr || '');
  return w.indexOf('סוכות') !== -1 || w.indexOf('פסח') !== -1;
}

function freshPageLists(big){
  const p = {};
  const src = big ? BIG_PAGES : DEFAULT_PAGES;
  SECTIONS.forEach(sec => { p[sec.key] = [...src]; });
  return p;
}

function isPageKey(key){ return /^\d+$/.test(String(key)); }
function isStripKey(key){ return String(key).indexOf('strip-') === 0; }

function visibleSections(){
  const big = isBigWeek(state.week);
  return SECTIONS.filter(sec => (sec.key === 'M2' || sec.key === 'B2') ? big : true);
}

function nowStamp(){
  return new Date().toLocaleString('en-US', {year:'2-digit', month:'2-digit', day:'2-digit', hour:'2-digit', minute:'2-digit', second:'2-digit'});
}

function escapeHtml(str){
  const d = document.createElement('div');
  d.innerText = str;
  return d.innerHTML;
}

function showSync(msg, type = 'syncing'){
  const el = document.getElementById('syncStatus');
  el.innerText = msg;
  el.className = 'sync-status show ' + type;
  setTimeout(() => el.classList.remove('show'), 3000);
}

function initializeAppState(){
  const big = isBigWeek(state.week);
  state.pageLists = freshPageLists(big);
  state.stripLists = {A:['strip-1'], B:['strip-1']};
  state.stripCounter = 1;
  render();
}

function setupRealtimeListeners(){
  // Listen to user's data
  const userDoc = db.collection('users').doc(state.user.uid);
  userDoc.get().then(snap => {
    if(!snap.exists) {
      userDoc.set({
        email: state.user.email,
        createdAt: new Date(),
        week: state.week,
        pageLists: state.pageLists,
        stripLists: state.stripLists,
        sections: state.sections,
        rules: state.rules,
        auditLog: state.auditLog
      });
    }
  });

  // Real-time listener
  userDoc.onSnapshot(snap => {
    if(snap.exists) {
      const data = snap.data();
      state.week = data.week || state.week;
      state.pageLists = data.pageLists || state.pageLists;
      state.stripLists = data.stripLists || state.stripLists;
      state.sections = data.sections || state.sections;
      state.rules = data.rules || state.rules;
      state.auditLog = data.auditLog || state.auditLog;
      render();
      showSync('סינקעד', 'success');
    }
  });
}

function saveToFirestore(){
  if(!state.user) {
    state.offlineQueue.push({week: state.week, sections: state.sections});
    showSync('ייאַרויס אָנליין — וועט סינקן', 'error');
    return;
  }
  
  db.collection('users').doc(state.user.uid).update({
    week: state.week,
    pageLists: state.pageLists,
    stripLists: state.stripLists,
    sections: state.sections,
    rules: state.rules,
    auditLog: state.auditLog,
    lastUpdated: new Date()
  }).catch(err => {
    console.error('Firestore error:', err);
    showSync('עררור סינקינג', 'error');
  });
}

// ============== LOGIN / AUTH ==============
function handleLogin(){
  const email = document.getElementById('emailInput').value.trim();
  const password = document.getElementById('passwordInput').value.trim();
  const errorEl = document.getElementById('loginError');
  
  if(!email || !password) {
    errorEl.innerText = 'ביטע גיב ימעיל און פּאַסווערד.';
    errorEl.classList.add('show');
    return;
  }

  const authFn = state.isSignupMode ? auth.createUserWithEmailAndPassword : auth.signInWithEmailAndPassword;

  authFn(email, password)
    .then(() => {
      errorEl.classList.remove('show');
      document.getElementById('emailInput').value = '';
      document.getElementById('passwordInput').value = '';
    })
    .catch(err => {
      errorEl.innerText = err.message;
      errorEl.classList.add('show');
    });
}

function toggleSignup(){
  state.isSignupMode = !state.isSignupMode;
  document.getElementById('loginBtn').innerText = state.isSignupMode ? 'נייער קאונט' : 'אָנמעלדן';
  document.getElementById('modeText').innerText = state.isSignupMode ? 'עם קאונט? ' : 'קיין קאונט? ';
  document.getElementById('toggleBtn').innerText = state.isSignupMode ? 'אָנמעלדן' : 'זיך רעגיסטרן';
}

function logout(){
  if(confirm('ווילט איר ווילט אויסמעלדן?')) {
    auth.signOut();
  }
}

// ============== RENDERING ==============
function render(){
  if(!state.user) return;
  
  if(!isBigWeek(state.week) && (state.activeSection === 'M2' || state.activeSection === 'B2')){
    state.activeSection = 'M';
  }
  
  renderTabs();
  document.getElementById('weekBtn').innerText = state.week;
  
  if(state.view === 'rules') renderRules();
  else if(state.view === 'audit') renderAudit();
  else renderGrid();
}

function renderTabs(){
  const el = document.getElementById('mainTabs');
  el.innerHTML = visibleSections().map(sec => `
    <div class="tab-main ${state.activeSection===sec.key && state.view==='grid' ? 'active':''}" onclick="selectSection('${sec.key}')">
      <span class="letter">${sec.key}</span>${sec.label}
    </div>
  `).join('');
  document.getElementById('utilRules').classList.toggle('active', state.view==='rules');
  document.getElementById('utilAudit').classList.toggle('active', state.view==='audit');
}

function selectSection(key){
  state.activeSection = key;
  state.view = 'grid';
  render();
}

function setView(v){
  state.view = v;
  render();
}

function renderGrid(){
  const sec = state.activeSection;
  const secLabel = SECTIONS.find(s=>s.key===sec).label;
  document.getElementById('boardArea').innerHTML = `
    <div class="section-caption">סעקשאן: ${secLabel} — וואך: <span class="week-link" onclick="openWeekPicker()">${escapeHtml(state.week)}</span></div>
    ${buildGridHTML(sec)}
  `;
}

function buildGridHTML(sec){
  const pagesData = state.sections[sec] || {};
  
  const pageCards = (state.pageLists[sec] || []).map(page=>{
    const client = pagesData[page];
    const filled = !!client;
    return `
      <div class="page-card">
        <div class="remove-x" onclick="event.stopPropagation(); removePage('${sec}', ${page})" title="אויסמעקן פעידזש">✕</div>
        <div class="page-head">
          <span class="num">${page}</span>
          <span class="side">${page%2===1 ? 'לינקע' : 'רעכטע'} זייט</span>
        </div>
        <div class="slot ${filled?'filled':'empty'}" onclick="openSlot('${sec}', ${page})">
          ${filled ? `<span class="client">${escapeHtml(client)}</span>` : '<span class="empty-txt">ליידיג</span>'}
        </div>
      </div>`;
  }).join('');

  return `
    <div class="subheading-row">
      <div class="subheading"></div>
      <button class="btn small ghost" style="color:var(--brass-dark); border-color:var(--brass-dark);" onclick="addPage('${sec}')">+ לייג צו א פעידזש</button>
    </div>
    <div class="pages-row">${pageCards}</div>
  `;
}

function addPage(sec){
  const input = prompt('וועלכע פעידזש נאמבער ווילסטו צולייגן?');
  if(input === null) return;
  const num = parseInt(String(input).trim());
  if(!num || num < 1){ alert('ביטע גיט א גילטיגע נאמבער.'); return; }
  if((state.pageLists[sec] || []).includes(num)){ alert('דער בלאט עקזיסטירט שוין.'); return; }
  if(!state.pageLists[sec]) state.pageLists[sec] = [];
  state.pageLists[sec].push(num);
  state.pageLists[sec].sort((a,b)=>a-b);
  if(!state.sections[sec]) state.sections[sec] = {};
  state.sections[sec][num] = null;
  saveToFirestore();
  render();
}

function removePage(sec, page){
  const client = state.sections[sec][page];
  const msg = client
    ? `פעידזש ${page} האט "${client}" — ווילט איר ווילט אויסמעקן דעם פעידזש?`
    : `ווילט איר ווילט אויסמעקן דעם פעידזש ${page}?`;
  if(!confirm(msg)) return;
  state.pageLists[sec] = state.pageLists[sec].filter(p => p !== page);
  delete state.sections[sec][page];
  saveToFirestore();
  render();
}

function openSlot(section, key){
  const rawCurrent = (state.sections[section] || {})[key] || '';
  const secLabel = SECTIONS.find(s=>s.key===section).label;

  let title = `בלאט ${key}`;
  let meta = `סעקשאן: ${secLabel}`;

  document.getElementById('modalRoot').innerHTML = `
    <div class="overlay" onclick="if(event.target===this) closeModal()">
      <div class="modal">
        <h3>${escapeHtml(title)}</h3>
        <div class="meta">${meta}</div>
        <label>קליענט נאמען</label>
        <input type="text" id="clientInput" value="${escapeHtml(rawCurrent)}" placeholder="למשל: Wine">
        <div id="warnArea"></div>
        <div class="modal-actions">
          <button class="btn ghost" onclick="closeModal()">אנולירן</button>
          <button class="btn" onclick="attemptSave('${section}', '${key}')">סעיוו</button>
        </div>
      </div>
    </div>
  `;
  document.getElementById('clientInput').focus();
}

function closeModal(){
  document.getElementById('modalRoot').innerHTML = '';
}

function attemptSave(section, key){
  const client = document.getElementById('clientInput').value.trim();
  if(!client){
    if(!state.sections[section]) state.sections[section] = {};
    state.sections[section][key] = null;
    closeModal();
    saveToFirestore();
    render();
    return;
  }
  if(!state.sections[section]) state.sections[section] = {};
  state.sections[section][key] = client;
  closeModal();
  saveToFirestore();
  render();
}

// ============== RULES ==============
function renderRules(){
  document.getElementById('boardArea').innerHTML = `
    <div class="section-caption">Rulls</div>
    <div class="empty-state">Rules management — coming soon with Firestore</div>
  `;
}

// ============== AUDIT LOG ==============
function renderAudit(){
  if(!(state.auditLog || []).length){
    document.getElementById('boardArea').innerHTML = `<div class="empty-state">קיין היסטאריע נאך.</div>`;
    return;
  }
  const rowsHtml = (state.auditLog || []).slice().reverse().map(a => `
    <tr>
      <td>${escapeHtml(a.ts)}</td>
      <td>${escapeHtml(a.client)}</td>
    </tr>
  `).join('');

  document.getElementById('boardArea').innerHTML = `
    <div class="section-caption">History</div>
    <table>
      <thead><tr><th>צייט</th><th>קליענט</th></tr></thead>
      <tbody>${rowsHtml}</tbody>
    </table>
  `;
}

// ============== EXPORT ==============
function exportExcel(){
  const rows = [];
  SECTIONS.forEach(sec=>{
    (state.pageLists[sec] || []).forEach(page=>{
      const client = (state.sections[sec] || {})[page] || '';
      rows.push({
        'סעקשאן': sec,
        'פעידזש': page,
        'קליענט': client
      });
    });
  });
  const ws = XLSX.utils.json_to_sheet(rows);
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, 'דאטן');
  XLSX.writeFile(wb, `דער-איד-${state.week.replace(/\s+/g,'_')}.xlsx`);
}

async function exportPDF(){
  const pdfBtn = document.getElementById('pdfBtn');
  const orig = pdfBtn.innerText;
  pdfBtn.disabled = true;
  pdfBtn.innerText = '⏳...';
  
  try{
    const { jsPDF } = window.jspdf;
    const pdf = new jsPDF({orientation:'landscape', unit:'pt', format:'a4'});
    
    for(let i=0;i<visibleSections().length;i++){
      const sec = visibleSections()[i];
      const wrap = document.createElement('div');
      wrap.style.cssText = 'position:fixed; left:-99999px; width:1050px; background:#f3ead8; padding:24px;';
      wrap.innerHTML = `<div style="font-family:serif; font-size:1.3rem; margin-bottom:14px;">${sec.label}</div>${buildGridHTML(sec.key)}`;
      document.body.appendChild(wrap);
      await new Promise(r => setTimeout(r, 100));
      const canvas = await html2canvas(wrap, {scale:2, backgroundColor:'#f3ead8'});
      document.body.removeChild(wrap);
      if(i>0) pdf.addPage();
      pdf.addImage(canvas.toDataURL('image/png'), 'PNG', 20, 20, 170, 130);
    }
    pdf.save(`דער-איד-${state.week.replace(/\s+/g,'_')}.pdf`);
  } catch(err) {
    console.error(err);
    alert('עררור');
  } finally {
    pdfBtn.disabled = false;
    pdfBtn.innerText = orig;
  }
}

// ============== WEEKS ==============
function openWeekPicker(){
  const allWeeks = [...BASE_WEEKS, ...state.customWeeks];
  const itemsHtml = allWeeks.map((w, i) => `
    <div style="padding:9px 12px; cursor:pointer; border-bottom:1px solid var(--paper-line); ${w===state.week?'background:var(--green-bg); font-weight:800;':''}" onclick="selectWeekByIndex(${i})">${escapeHtml(w)}</div>
  `).join('');

  document.getElementById('modalRoot').innerHTML = `
    <div class="overlay" onclick="if(event.target===this) closeModal()">
      <div class="modal" style="max-width:380px;">
        <h3>קלייבט א וואך</h3>
        <div style="max-height:50vh; overflow-y:auto; border:1px solid var(--paper-dark); border-radius:6px; margin-top:10px;">
          ${itemsHtml}
        </div>
        <div class="modal-actions">
          <button class="btn ghost" onclick="closeModal()">פארמאכן</button>
        </div>
      </div>
    </div>
  `;
}

function selectWeekByIndex(i){
  const allWeeks = [...BASE_WEEKS, ...state.customWeeks];
  const w = allWeeks[i];
  if(w){
    state.week = w;
    closeModal();
    const big = isBigWeek(state.week);
    state.pageLists = freshPageLists(big);
    saveToFirestore();
    render();
  }
}

function addWeekOption(){
  const val = prompt('לייגט צו א נייע וואך (MM/DD/YY)');
  if(val === null) return;
  const trimmed = val.trim();
  if(!trimmed) return;
  state.customWeeks.push(trimmed);
  state.week = trimmed;
  saveToFirestore();
  render();
}

function onResetWeek(){
  if(!confirm('לירן אלע פעידזשעס?')) return;
  const big = isBigWeek(state.week);
  state.pageLists = freshPageLists(big);
  state.stripLists = {A:['strip-1'], B:['strip-1']};
  state.sections = {};
  state.stripCounter = 1;
  saveToFirestore();
  render();
}

// ============== PWA ==============
if('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js').catch(err => console.log('SW registration failed:', err));
}

</script>
